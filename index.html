<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EvoTravel - 智能旅行规划</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1>EvoTravel</h1>
      <span class="subtitle">会学习的旅行规划助手</span>
      <div class="header-actions">
        <button id="btn-new-trip" title="开始新旅程">新旅程</button>
        <button id="btn-clear" title="清除所有数据">清除数据</button>
      </div>
    </header>

    <main class="main-layout">
      <!-- 左侧：聊天区域 -->
      <section class="chat-area">
        <div id="chat-messages" class="chat-messages"></div>

        <div class="input-area">
          <textarea id="user-input" placeholder="描述你的旅行需求，例如：我想去东京玩3天..." rows="2"></textarea>
          <button id="btn-send" title="发送">发送</button>
        </div>
      </section>

      <!-- 右侧：偏好面板 + 地图 -->
      <aside class="experience-panel">
        <div class="panel-tabs">
          <button class="panel-tab active" data-tab="profile">用户画像</button>
          <button class="panel-tab" data-tab="map">行程地图</button>
        </div>

        <div class="panel-content" id="tab-profile">
          <div class="exp-section">
            <h3>已积累偏好 <span id="pref-count" class="badge">0</span></h3>
            <ul id="pref-list" class="exp-list"></ul>
          </div>

          <div class="exp-section">
            <h3>历史记录 <span id="history-count" class="badge">0</span></h3>
            <ul id="history-list" class="exp-list history-list"></ul>
          </div>
        </div>

        <div class="panel-content" id="tab-map" style="display:none;">
          <div id="day-tabs" class="day-tabs" style="display:none"></div>
          <div id="itinerary-map" class="itinerary-map"></div>
          <div id="map-info" class="map-info">生成行程后，地图将自动展示行程路线</div>
        </div>
      </aside>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="prompt.js"></script>
  <script src="route.js"></script>
  <script src="train.js"></script>
  <script src="hotel.js"></script>
  <script src="transit.js"></script>
  <script src="https://webapi.amap.com/maps?v=2.0&key=66f05be662e85e2a51bbcedca83f99c8"></script>
  <script src="app.js"></script>
</body>
</html>
